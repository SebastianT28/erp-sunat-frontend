# ===== ACTUATOR + OPENTELEMETRY (OTLP - Push a Grafana Cloud) =====
management.endpoints.web.exposure.include=health,info
management.endpoints.web.base-path=/actuator

# Etiquetas globales para todas las métricas
management.metrics.tags.application=erp-sunat
management.metrics.tags.environment=${APP_ENV:production}

# Exportación OTLP hacia Grafana Cloud (las variables se configuran en Render)
management.otlp.metrics.export.url=${GRAFANA_OTLP_URL:https://otlp-gateway-prod-us-east-0.grafana.net/otlp/v1/metrics}
management.otlp.metrics.export.headers.Authorization=Basic ${GRAFANA_OTLP_TOKEN}
management.otlp.metrics.export.step=15s

# Métricas detalladas habilitadas
management.metrics.enable.jvm=true
management.metrics.enable.process=true
management.metrics.enable.system=true
management.metrics.enable.hikaricp=true
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.slo.http.server.requests=50ms,100ms,200ms,500ms,1s
