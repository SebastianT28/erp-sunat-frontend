# ===== ACTUATOR + OPENTELEMETRY (OTLP - Push a Grafana Cloud) =====
# El Bean OtlpMeterRegistry se crea manualmente en OtlpMetricsConfig.java
# Las siguientes variables de entorno deben estar configuradas en Render:
#   GRAFANA_OTLP_URL  = https://otlp-gateway-prod-sa-east-1.grafana.net/otlp/v1/metrics
#   GRAFANA_OTLP_TOKEN = Base64 de "1686895:glc_tu_token"
management.endpoints.web.exposure.include=health,info
management.endpoints.web.base-path=/actuator

# Etiquetas globales para todas las métricas
management.metrics.tags.application=erp-sunat
management.metrics.tags.environment=${APP_ENV:production}

# Métricas detalladas habilitadas
management.metrics.enable.jvm=true
management.metrics.enable.process=true
management.metrics.enable.system=true
management.metrics.enable.hikaricp=true
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.slo.http.server.requests=50ms,100ms,200ms,500ms,1s


