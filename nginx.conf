events {
    worker_connections 1024;
}

http {
    # Definicion del grupo de servidores (Round Robin por defecto)
    upstream erp_backend {
        server backend1:8080;
        server backend2:8080;
    }

    server {
        listen 80;

        # Logs de acceso para evidenciar la distribucion de carga
        access_log /var/log/nginx/access.log;
        error_log  /var/log/nginx/error.log;

        location / {
            proxy_pass         http://erp_backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Timeouts para evitar cuellos de botella
            proxy_connect_timeout  60s;
            proxy_send_timeout     60s;
            proxy_read_timeout     60s;
        }

        # Endpoint de health check del propio Nginx
        location /nginx-status {
            stub_status on;
            allow 127.0.0.1;
            deny all;
        }
    }
}
