name: K6 Load Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  load-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build Next.js application
      run: npm run build

    - name: Start Next.js server in background
      run: |
        npm run start &
        npx wait-on http://localhost:3000 -t 60000

    - name: Run k6 load test
      uses: grafana/k6-action@v0.3.1
      with:
        filename: performance-tests/load-test.js
        flags: --out cloud
        token: ${{ secrets.K6_CLOUD_TOKEN }}
      env:
        # Usamos la IP de la red bridge de docker (172.17.0.1) para que k6 (que corre en un contenedor)
        # pueda comunicarse con el servidor Next.js que corre en el host (el runner de GitHub Actions).
        TARGET_URL: 'http://172.17.0.1:3000'
