name: "CodeQL Security Scan"

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '30 2 * * 1' # Ejecutar un escaneo completo automáticamente cada lunes a las 2:30 AM

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        # CodeQL considera 'javascript' y 'typescript' como un mismo analizador
        language: [ 'java', 'javascript' ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # Configurar Java solo si el lenguaje actual de la matriz es 'java'
    - name: Setup Java JDK 21
      if: matrix.language == 'java'
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'

    # Inicializa las herramientas de CodeQL para el escaneo
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}
        # Queries adicionales para encontrar vulnerabilidades críticas de OWASP
        queries: security-extended,security-and-quality

    # CodeQL necesita compilar los lenguajes fuertemente tipados (como Java) para analizarlos
    - name: Build Java Backend
      if: matrix.language == 'java'
      run: |
        cd backend
        chmod +x ./mvnw
        ./mvnw clean package -DskipTests

    # Realiza el análisis final y sube los resultados a la pestaña "Security" de tu repo
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:${{matrix.language}}"
