name: Database Automated Backup

on:
  # Permite ejecutar el workflow manualmente desde la interfaz de GitHub
  workflow_dispatch:
  
  # Ejecuta automáticamente todos los días a las 3:00 AM UTC (10:00 PM o 11:00 PM EST, ajusta según tu zona horaria)
  schedule:
    - cron: '0 3 * * *'

jobs:
  backup:
    name: Supabase Database Backup
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Instalar cliente de PostgreSQL 17
        run: |
          # Agregar el repositorio oficial de PostgreSQL para obtener la versión 17
          sudo apt-get install -y curl ca-certificates
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo tee /etc/apt/trusted.gpg.d/postgresql.asc > /dev/null
          echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Generar Timestamp
        id: timestamp
        run: echo "date=$(date +'%Y-%m-%d_%H-%M-%S')" >> $GITHUB_OUTPUT

      - name: Ejecutar pg_dump y comprimir
        env:
          PGHOST: ${{ secrets.DB_HOST }}
          PGUSER: ${{ secrets.DB_USER }}
          PGPASSWORD: ${{ secrets.DB_PASSWORD }}
          PGDATABASE: ${{ secrets.DB_NAME }}
          # Usamos el puerto 6543 (Connection Pooler) porque GitHub Actions tiene problemas con IPv6 (Direct Connection)
          PGPORT: 6543
        run: |
          echo "Iniciando respaldo de la base de datos..."
          # Utilizamos pg_dump en formato custom (-Fc) que es el más flexible para restaurar, 
          # o en texto plano comprimido. Aquí optamos por texto plano comprimido con gzip.
          pg_dump -h $PGHOST -p $PGPORT -U $PGUSER -d $PGDATABASE -F c -f backup_erp_sunat_${{ steps.timestamp.outputs.date }}.dump
          echo "Respaldo completado exitosamente."

      - name: Subir Backup a GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: database-backup-${{ steps.timestamp.outputs.date }}
          path: backup_erp_sunat_${{ steps.timestamp.outputs.date }}.dump
          # GitHub Artifacts guarda los archivos por 90 días por defecto
          retention-days: 30

      - name: Instalar rclone
        run: |
          curl https://rclone.org/install.sh | sudo bash

      - name: Configurar rclone con Service Account de Google
        env:
          GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: |
          mkdir -p ~/.config/rclone
          # Escribir el JSON de la service account en un archivo temporal seguro
          echo "${GDRIVE_SERVICE_ACCOUNT_JSON}" > /tmp/gdrive-sa.json
          # Crear la configuración de rclone apuntando a la carpeta raíz del Drive
          cat > ~/.config/rclone/rclone.conf << EOF
          [gdrive]
          type = drive
          scope = drive
          service_account_file = /tmp/gdrive-sa.json
          root_folder_id = ${GDRIVE_FOLDER_ID}
          EOF

      - name: Subir Backup a Google Drive
        run: |
          # Organizar en subcarpeta por mes (ej: 2026-07)
          MONTH_FOLDER=$(date +'%Y-%m')
          BACKUP_FILE="backup_erp_sunat_${{ steps.timestamp.outputs.date }}.dump"
          echo "📤 Subiendo ${BACKUP_FILE} a Google Drive en carpeta: ${MONTH_FOLDER}/"
          rclone copy "${BACKUP_FILE}" "gdrive:${MONTH_FOLDER}/" --verbose
          echo "✅ Backup subido exitosamente a Google Drive."
          echo "📁 Ubicación: ERP-SUNAT-Backups/${MONTH_FOLDER}/${BACKUP_FILE}"

      - name: Limpiar credenciales temporales
        if: always()
        run: |
          rm -f /tmp/gdrive-sa.json
          echo "🔒 Credenciales temporales eliminadas."
