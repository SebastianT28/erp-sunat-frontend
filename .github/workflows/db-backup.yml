name: Database Automated Backup

on:
  # Permite ejecutar el workflow manualmente desde la interfaz de GitHub
  workflow_dispatch:
  
  # Ejecuta automáticamente todos los días a las 3:00 AM UTC (10:00 PM o 11:00 PM EST, ajusta según tu zona horaria)
  schedule:
    - cron: '0 3 * * *'

jobs:
  backup:
    name: Supabase Database Backup
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Instalar cliente de PostgreSQL
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Generar Timestamp
        id: timestamp
        run: echo "date=$(date +'%Y-%m-%d_%H-%M-%S')" >> $GITHUB_OUTPUT

      - name: Ejecutar pg_dump y comprimir
        env:
          PGHOST: ${{ secrets.DB_HOST }}
          PGUSER: ${{ secrets.DB_USER }}
          PGPASSWORD: ${{ secrets.DB_PASSWORD }}
          PGDATABASE: ${{ secrets.DB_NAME }}
          # Usamos el puerto 6543 (Connection Pooler) porque GitHub Actions tiene problemas con IPv6 (Direct Connection)
          PGPORT: 6543
        run: |
          echo "Iniciando respaldo de la base de datos..."
          # Utilizamos pg_dump en formato custom (-Fc) que es el más flexible para restaurar, 
          # o en texto plano comprimido. Aquí optamos por texto plano comprimido con gzip.
          pg_dump -h $PGHOST -p $PGPORT -U $PGUSER -d $PGDATABASE -F c -f backup_erp_sunat_${{ steps.timestamp.outputs.date }}.dump
          echo "Respaldo completado exitosamente."

      - name: Subir Backup a GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: database-backup-${{ steps.timestamp.outputs.date }}
          path: backup_erp_sunat_${{ steps.timestamp.outputs.date }}.dump
          # GitHub Artifacts guarda los archivos por 90 días por defecto
          retention-days: 30
