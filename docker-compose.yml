services:

  # ─────────────────────────────────────────────
  # BALANCEADOR DE CARGA — Nginx
  # Distribuye el trafico entre backend1 y backend2
  # Acceso: http://localhost
  # ─────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: erp_nginx_lb
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend1
      - backend2
    restart: on-failure

  # ─────────────────────────────────────────────
  # INSTANCIA 1 DEL BACKEND — Spring Boot
  # ─────────────────────────────────────────────
  backend1:
    build: ./backend
    container_name: erp_backend_1
    expose:
      - "8080"
    environment:
      - PORT=8080
      - SPRING_DATASOURCE_URL=jdbc:postgresql://aws-1-us-east-1.pooler.supabase.com:6543/postgres?prepareThreshold=0&preferQueryMode=simple
      - SPRING_DATASOURCE_USERNAME=postgres.dndeevsqdjdbveotnrkh
      - SPRING_DATASOURCE_PASSWORD=SebastianT28_$%#
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://localhost:80
      - APP_ENV=local-lb-demo
      - GRAFANA_OTLP_URL=http://localhost:4318/otlp/v1/metrics
      - GRAFANA_OTLP_TOKEN=demo-token-disabled
      - JIRA_API_TOKEN=demo-token-disabled
    restart: on-failure

  # ─────────────────────────────────────────────
  # INSTANCIA 2 DEL BACKEND — Spring Boot
  # ─────────────────────────────────────────────
  backend2:
    build: ./backend
    container_name: erp_backend_2
    expose:
      - "8080"
    environment:
      - PORT=8080
      - SPRING_DATASOURCE_URL=jdbc:postgresql://aws-1-us-east-1.pooler.supabase.com:6543/postgres?prepareThreshold=0&preferQueryMode=simple
      - SPRING_DATASOURCE_USERNAME=postgres.dndeevsqdjdbveotnrkh
      - SPRING_DATASOURCE_PASSWORD=SebastianT28_$%#
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://localhost:80
      - APP_ENV=local-lb-demo
      - GRAFANA_OTLP_URL=http://localhost:4318/otlp/v1/metrics
      - GRAFANA_OTLP_TOKEN=demo-token-disabled
      - JIRA_API_TOKEN=demo-token-disabled
    restart: on-failure
